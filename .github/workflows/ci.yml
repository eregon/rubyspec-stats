name: CI
on:
  push:
    branches: [master]
  schedule:
  - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  specs:
    # if: false # uncomment this to only deploy
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
        - { name: ruby, ruby: ruby-4.0, repo: ruby/ruby }
        - { name: jruby, ruby: jruby-head, repo: jruby/jruby }
        - { name: truffleruby, ruby: truffleruby-head, repo: oracle/truffleruby }
    runs-on: ubuntu-latest
    env:
      JRUBY_OPTS: "--dev" # Takes 14min instead of 21min otherwise on JRuby
      # No other implementation-specific options are allowed, we should test with no options, that is with defaults, because that is what users see.
    steps:
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}

    - if: matrix.name != 'ruby'
      id: ruby_revision
      run: echo "sha=$(ruby -e 'puts RUBY_REVISION')" >> $GITHUB_OUTPUT
    - if: matrix.name != 'ruby'
      uses: actions/checkout@v6
      with:
        repository: ${{ matrix.repo }}
        ref: ${{ steps.ruby_revision.outputs.sha }}

    - if: matrix.name == 'ruby'
      uses: actions/checkout@v6
      with:
        repository: ${{ matrix.repo }}

    - name: Remove file on CRuby to test the ruby in PATH
      run: rm spec/default.mspec
      if: matrix.name == 'ruby'

    - run: mkdir ${{ matrix.name }}

    - name: Save RUBY_VERSION
      run: ruby -e 'puts RUBY_VERSION' > ${{ matrix.name }}/RUBY_VERSION

    - name: Set MSPEC
      run: echo "MSPEC=spec/mspec/bin/mspec ci --timeout 60 --target $(which ruby) --marker . --format yaml --output stats.yml" >> $GITHUB_ENV

    - name: language specs
      run: $MSPEC spec/ruby/language
      continue-on-error: true
    - run: mv stats.yml ${{ matrix.name }}/language.yml

    - name: core specs
      run: $MSPEC spec/ruby/core
      continue-on-error: true
    - run: mv stats.yml ${{ matrix.name }}/core.yml

    - name: library specs
      run: $MSPEC spec/ruby/library
      continue-on-error: true
    - run: mv stats.yml ${{ matrix.name }}/library.yml

    - name: security specs
      run: $MSPEC spec/ruby/security
      continue-on-error: true
    - run: mv stats.yml ${{ matrix.name }}/security.yml

    - name: command_line specs
      run: $MSPEC spec/ruby/command_line
      continue-on-error: true
    - run: mv stats.yml ${{ matrix.name }}/command_line.yml

    - name: capi specs
      run: $MSPEC spec/ruby/optional/capi
      continue-on-error: true
      if: matrix.name != 'jruby'
    - run: mv stats.yml ${{ matrix.name }}/capi.yml
      if: matrix.name != 'jruby'

    - uses: actions/checkout@v6
      with:
        ref: master
        path: rubyspec-stats
        fetch-depth: 0
    - run: rm -rf "${{ matrix.name }}"
      working-directory: rubyspec-stats
    - run: cp -R "../${{ matrix.name }}" .
      working-directory: rubyspec-stats
    - name: Commit and push
      working-directory: rubyspec-stats
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "${{ matrix.name }}"
        git commit -m "Update ${{ matrix.name }} spec results"
        git pull --rebase
        git push

  monoruby:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: "4.0"

    - id: monoruby
      uses: sisshiki1969/monoruby@master

    - name: Clone ruby/spec and mspec
      run: |
        git clone --depth 1 https://github.com/ruby/spec.git spec/ruby
        git clone --depth 1 https://github.com/ruby/mspec.git spec/mspec

    # spec/tags is maintained in the monoruby repo so upstream doesn't need
    # PRs for each hanging/failing spec.
    - name: Clone monoruby for spec/tags
      run: |
        git clone --depth 1 https://github.com/sisshiki1969/monoruby.git monoruby-repo
        mkdir -p spec/tags/ruby
        [ -d monoruby-repo/spec/tags ] && cp -R monoruby-repo/spec/tags/. spec/tags/ruby/ || true

    - uses: actions/checkout@v6
      with:
        ref: master
        path: rubyspec-stats
        fetch-depth: 0

    - run: mkdir monoruby

    - name: Save RUBY_VERSION
      run: echo "${{ steps.monoruby.outputs.ruby-version }}" > monoruby/RUBY_VERSION

    - name: Set MSPEC
      run: echo "MSPEC=timeout 90 spec/mspec/bin/mspec ci --target monoruby --format yaml --output stats.yml" >> $GITHUB_ENV

    - name: language specs
      run: $MSPEC spec/ruby/language
      continue-on-error: true
    - run: mv stats.yml monoruby/language.yml

    - name: core specs
      run: $MSPEC spec/ruby/core
      continue-on-error: true
    - run: mv stats.yml monoruby/core.yml

    - name: library specs
      run: $MSPEC spec/ruby/library
      continue-on-error: true
    - run: mv stats.yml monoruby/library.yml

    - name: security specs
      run: $MSPEC spec/ruby/security
      continue-on-error: true
    - run: mv stats.yml monoruby/security.yml

    - name: command_line specs
      run: $MSPEC spec/ruby/command_line
      continue-on-error: true
    - run: mv stats.yml monoruby/command_line.yml

    # Text-strip the `exceptions:` block — monoruby's YAML output occasionally
    # emits escape sequences that CRuby's Psych can't parse. Also keeps the
    # committed yml files small (drops tens of KB of failure text).
    - name: Strip yaml exceptions
      run: |
        for f in monoruby/*.yml; do
          ruby -e '
            p = ARGV[0]
            src = File.read(p)
            if src.strip.empty?
              File.write(p, "--- {}\n"); exit
            end
            out, in_exc = [], false
            src.each_line do |line|
              if !in_exc && line.start_with?("exceptions:")
                in_exc = true; out << "exceptions:\n"; next
              end
              in_exc = false if in_exc && line =~ /\A[a-zA-Z_]+:/
              out << line unless in_exc
            end
            File.write(p, out.join)
          ' "$f"
        done

    - run: rm -rf monoruby
      working-directory: rubyspec-stats
    - run: cp -R ../monoruby .
      working-directory: rubyspec-stats
    - name: Commit and push
      working-directory: rubyspec-stats
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add monoruby
        if git diff --cached --quiet; then
          echo "no changes to commit"
          exit 0
        fi
        git commit -m "Update monoruby spec results"
        git pull --rebase
        git push

  html:
    needs: [specs, monoruby] # comment this out to only deploy
    if: ${{ always() && needs.specs.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: master
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.2

    - run: mkdir site
    - run: ruby analyze_per_file.rb --html ruby/*.yml truffleruby/*.yml jruby/*.yml monoruby/*.yml > site/index.html

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: site

  deploy:
    permissions:
      pages: write
      id-token: write
    needs: [html]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
